
services:
  tracker-1:
    build:
      context: ../tracker
      dockerfile: Dockerfile
    container_name: tracker-1
    hostname: tracker-1
    environment:
      - SERVICES__TRACKER_ID=tracker-1
      - SERVICES__TRACKER__HOST=0.0.0.0
      - SERVICES__TRACKER__PORT=5555
      - SERVICES__CLUSTER__HOST=0.0.0.0
      - SERVICES__CLUSTER__PORT=5556
      - SERVICES__CLUSTER__SERVICE_NAME=tracker
      - SERVICES__CLUSTER__DISCOVERY_PING_SUBNET=172.28.0.0/24
    ports:
      - "5555:5555"  # RPC port
      - "5556:5556"  # Cluster port
    networks:
      torrent_net:
        aliases:
          - tracker
    volumes:
      - ../tracker/src:/app/src
      - ../bit_lib:/bit_lib
      - tracker1-data:/app/data
    entrypoint: ["/bin/sh", "-c", "uv sync --extra libs --no-managed-python && uv run app"]

  tracker-2:
    build:
      context: ../tracker
      dockerfile: Dockerfile
    container_name: tracker-2
    hostname: tracker-2
    environment:
      - SERVICES__TRACKER_ID=tracker-2
      - SERVICES__TRACKER__HOST=0.0.0.0
      - SERVICES__TRACKER__PORT=5555
      - SERVICES__CLUSTER__HOST=0.0.0.0
      - SERVICES__CLUSTER__PORT=5556
      - SERVICES__CLUSTER__SERVICE_NAME=tracker
      - SERVICES__CLUSTER__DISCOVERY_PING_SUBNET=172.28.0.0/24
    ports:
      - "5557:5555"  # RPC port
      - "5558:5556"  # Cluster port
    networks:
      torrent_net:
        aliases:
          - tracker
    volumes:
      - ../tracker/src:/app/src
      - ../bit_lib:/bit_lib
      - tracker2-data:/app/data
    depends_on:
      - tracker-1
    entrypoint: ["/bin/sh", "-c", "uv sync --extra libs --no-managed-python && uv run app"]

networks:
  torrent_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  tracker1-data:
  tracker2-data: